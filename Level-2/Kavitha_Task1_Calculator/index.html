<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator App</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="calculator-shell">
        <section class="calculator-card">
            <h1>Calculator</h1>
            <div class="display" id="display">0</div>
            <div class="keys-grid">
                <button data-value="7">7</button>
                <button data-value="8">8</button>
                <button data-value="9">9</button>
                <button data-value="/">÷</button>
                <button data-value="4">4</button>
                <button data-value="5">5</button>
                <button data-value="6">6</button>
                <button data-value="*">×</button>
                <button data-value="1">1</button>
                <button data-value="2">2</button>
                <button data-value="3">3</button>
                <button data-value="-">−</button>
                <button data-value="0">0</button>
                <button data-value=".">.</button>
                <button data-action="clear">C</button>
                <button data-value="+">+</button>
                <button class="wide" data-action="equals">=</button>
            </div>
        </section>
    </main>

    <script>
        const display = document.getElementById('display');
        const keys = document.querySelectorAll('button[data-value], button[data-action]');
        let currentValue = '0';

        function updateDisplay() {
            display.textContent = currentValue;
        }

        function safeEval(expression) {
            try {
                return Function(`"use strict"; return (${expression})`)();
            } catch {
                return 'Error';
            }
        }

        keys.forEach(key => {
            key.addEventListener('click', () => {
                const value = key.dataset.value;
                const action = key.dataset.action;

                if (action === 'clear') {
                    currentValue = '0';
                } else if (action === 'equals') {
                    const result = safeEval(currentValue.replace(/×/g, '*').replace(/÷/g, '/'));
                    currentValue = result === 'Error' ? 'Error' : String(result);
                } else if (value) {
                    if (currentValue === '0' || currentValue === 'Error') {
                        currentValue = value;
                    } else {
                        currentValue += value;
                    }
                }
                updateDisplay();
            });
        });
    </script>
</body>
</html>
